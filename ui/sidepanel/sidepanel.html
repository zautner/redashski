<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="sidePanelTitle">Redashski - Result History</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sidepanel-container">
    <header class="sidepanel-header">
      <div class="header-left">
        <svg class="logo-mark" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="22" height="22" rx="6" fill="url(#spLogoGrad)"/>
          <rect x="5" y="5" width="12" height="12" rx="2" fill="white" opacity="0.15"/>
          <rect x="10" y="5" width="1.8" height="12" fill="white" opacity="0.9"/>
          <circle cx="15.5" cy="6.5" r="2.5" fill="#34d399"/>
          <defs>
            <linearGradient id="spLogoGrad" x1="0" y1="0" x2="22" y2="22" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7c6af7"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 data-i18n="sidePanelTitle">Redashski</h1>
        <span id="versionBadge" class="version-badge">v1.0.2</span>
        <span id="itemCount" class="item-count"></span>
      </div>
      <div class="header-actions" id="headerActions">
        <button id="refreshBtn" class="icon-button" title="Refresh">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 8a6 6 0 0110.89-3.48M14 8a6 6 0 01-10.89 3.48" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M13.5 2v3.5H10M2.5 14v-3.5H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="clearAllBtn" class="text-button danger" data-i18n="clearHistory">Clear All</button>
      </div>
    </header>

    <main id="resultsContainer" class="sidepanel-main">
      <div id="notPermittedState" class="empty-state" style="display:none;">
        <svg class="empty-state-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="26" stroke="currentColor" stroke-width="2"/>
          <path d="M20 32h24M32 20v24" stroke="currentColor" stroke-width="2" stroke-linecap="round" transform="rotate(45 32 32)"/>
        </svg>
        <p>This tab is not a permitted Redash URL. Add it in Settings to capture results here.</p>
      </div>
      <div id="emptyState" class="empty-state">
        <svg class="empty-state-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="12" width="52" height="40" rx="3" stroke="currentColor" stroke-width="2"/>
          <line x1="6" y1="22" x2="58" y2="22" stroke="currentColor" stroke-width="2"/>
          <line x1="22" y1="22" x2="22" y2="52" stroke="currentColor" stroke-width="2"/>
          <circle cx="44" cy="37" r="8" stroke="currentColor" stroke-width="2"/>
          <line x1="51" y1="44" x2="56" y2="49" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p data-i18n="sidePanelEmpty">No results captured. Navigate to Redash queries to capture results.</p>
      </div>
      <div id="resultsList" class="results-list"></div>
    </main>

    <footer class="sidepanel-footer">
      <div class="footer-left">
        <button id="openSettingsBtn" class="icon-button small" title="Settings">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 10a2 2 0 100-4 2 2 0 000 4z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13.5 8a5.5 5.5 0 01-.3 1.8l1.4 1.1-1.5 2.6-1.9-.6a5.5 5.5 0 01-2.2 1.1l-.5 1.9h-3l-.5-1.9a5.5 5.5 0 01-2.2-1.1l-1.9.6-1.5-2.6 1.4-1.1A5.5 5.5 0 012.5 8 5.5 5.5 0 018 2.5a5.5 5.5 0 015.5 5.5z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button id="snapBtn" class="icon-button small" title="Snap — capture current live results from this tab">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 2H3a1 1 0 00-1 1v3M10 2h3a1 1 0 011 1v3M6 14H3a1 1 0 01-1-1v-3M10 14h3a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <span id="lastUpdated" class="last-updated"></span>
    </footer>

    <div id="settingsOverlay" class="settings-overlay hidden">
      <div class="settings-panel">
        <div class="settings-header">
          <h2 data-i18n="settings">Settings</h2>
          <button id="closeSettingsBtn" class="icon-button">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
        <div class="settings-body">
          <div class="form-group">
            <label for="permittedUrls" data-i18n="permittedUrls">Permitted Redash URLs</label>
            <p class="help-text" data-i18n="permittedUrlsHelp">One URL prefix per line</p>
            <textarea id="permittedUrls" rows="6" placeholder="https://redash.example.com/"></textarea>
          </div>
          <div class="form-group">
            <label for="queueSize" data-i18n="queueSize">Queue Size Per Tab</label>
            <p class="help-text" data-i18n="queueSizeHelp">How many results to keep per open tab (1-100)</p>
            <input id="queueSize" type="number" min="1" max="100" step="1" value="10">
          </div>
        </div>
        <div class="settings-footer">
          <button id="cancelSettingsBtn" class="secondary-button" data-i18n="cancel">Cancel</button>
          <button id="saveSettingsBtn" class="primary-button" data-i18n="save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
