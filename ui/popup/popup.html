<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="popupTitle">Redashski</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="header-left">
        <svg class="logo-mark" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="7" fill="url(#logoGrad)"/>
          <rect x="4.5" y="4.5" width="15" height="15" rx="3" fill="white" opacity="0.1"/>
          <rect x="7" y="7" width="2" height="10" rx="1" fill="white" opacity="0.7"/>
          <rect x="11" y="5" width="2" height="14" rx="1" fill="white" opacity="0.9"/>
          <rect x="15" y="9" width="2" height="6" rx="1" fill="white" opacity="0.55"/>
          <circle cx="18" cy="6" r="2.8" fill="#3ddba0"/>
          <circle cx="18" cy="6" r="2.8" fill="url(#dotGlow)" opacity="0.5"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7b68ee"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
            <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
              <stop stop-color="#7dffcc"/>
              <stop offset="1" stop-color="#3ddba0" stop-opacity="0"/>
            </radialGradient>
          </defs>
        </svg>
        <h1 data-i18n="popupTitle">Redashski</h1>
        <span id="versionBadge" class="version-badge">v1.0.2</span>
      </div>
      <div class="header-actions">
        <button id="snapNow" class="icon-button snap-btn" title="Snap current results">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 2H3a1 1 0 00-1 1v3M10 2h3a1 1 0 011 1v3M6 14H3a1 1 0 01-1-1v-3M10 14h3a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
          </svg>
        </button>
        <button id="openSidePanel" class="icon-button" title="Open Side Panel">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="10.5" y1="1.5" x2="10.5" y2="14.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button id="openSettings" class="icon-button" title="Settings">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="quickstartView" class="popup-main">
      <section class="popup-quickstart">
        <div class="quickstart-item">
          <span class="quickstart-num">1</span>
          <span>Add your Redash URLs in <strong>Settings</strong></span>
        </div>
        <div class="quickstart-item">
          <span class="quickstart-num">2</span>
          <span>Open a Redash query page</span>
        </div>
        <div class="quickstart-item">
          <span class="quickstart-num">3</span>
          <span>Click <strong>Snap</strong> or use the side panel</span>
        </div>
      </section>
    </main>

    <main id="settingsView" class="popup-main hidden">
      <section class="settings-section">
        <div class="form-group">
          <label for="permittedUrls" data-i18n="permittedUrls">Permitted Redash URLs</label>
          <p class="help-text" data-i18n="permittedUrlsHelp">One URL prefix per line (e.g., https://redash.example.com/)</p>
          <textarea id="permittedUrls" rows="4" placeholder="https://redash.example.com/"></textarea>
        </div>
        <div class="form-group">
          <label for="queueSize" data-i18n="queueSize">Queue Size Per Tab</label>
          <p class="help-text" data-i18n="queueSizeHelp">How many results to keep per open tab (1-100)</p>
          <input id="queueSize" type="number" min="1" max="100" step="1" value="10">
        </div>
        <div class="form-actions">
          <button id="saveSettings" class="primary-button" data-i18n="save">Save</button>
        </div>
      </section>
    </main>

    <footer class="popup-footer">
      <span id="statusText" class="status-text"></span>
      <div class="footer-links">
        <a id="privacyLink" class="footer-link" href="#" title="Privacy Policy">Privacy</a>
      </div>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
